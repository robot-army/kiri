name: KiCad E2E (manual)

on:
  workflow_dispatch:
    inputs:
      fixture_repo:
        description: "Fixture repository URL"
        required: false
        default: "https://github.com/robot-army/programmable-led-panel.git"
      fixture_ref:
        description: "Fixture git ref"
        required: false
        default: "main"
      fixture_old_commit:
        description: "Optional older commit hash to compare (empty = HEAD~1)"
        required: false
        default: ""
      fixture_new_commit:
        description: "Optional newer commit hash to compare (empty = HEAD)"
        required: false
        default: ""

jobs:
  kicad-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout KiRI
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1.53.2-chromium-${{ runner.os }}

      - name: Cache KiCad apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: kicad-9.0-apt-${{ runner.os }}-v1
          restore-keys: |
            kicad-9.0-apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sexpdata
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            kicad kicad-footprints kicad-symbols kicad-templates dos2unix
          npm install --no-save playwright@1.53.2
          if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]]; then
            npx playwright@1.53.2 install --with-deps chromium
          else
            npx playwright@1.53.2 install-deps chromium
          fi

      - name: Show tool versions
        run: |
          python --version
          node --version
          npm --version
          kicad-cli --version
          dos2unix --version | head -n 1

      - name: Clone fixture project
        run: |
          git clone --branch "${{ github.event.inputs.fixture_ref || 'main' }}" "${{ github.event.inputs.fixture_repo || 'https://github.com/robot-army/programmable-led-panel.git' }}" /tmp/kiri-fixture
          cd /tmp/kiri-fixture
          git rev-parse HEAD

      - name: Resolve comparison commits
        id: commits
        run: |
          cd /tmp/kiri-fixture

          if [[ -n "${{ github.event.inputs.fixture_old_commit }}" ]] && [[ -n "${{ github.event.inputs.fixture_new_commit }}" ]]; then
            OLDEST=$(git rev-parse --short "${{ github.event.inputs.fixture_old_commit }}")
            NEWEST=$(git rev-parse --short "${{ github.event.inputs.fixture_new_commit }}")
          else
            NEWEST=$(git rev-parse --short HEAD)
            OLDEST=$(git rev-parse --short HEAD~1)
          fi

          echo "newest=$NEWEST" >> "$GITHUB_OUTPUT"
          echo "oldest=$OLDEST" >> "$GITHUB_OUTPUT"

      - name: Run KiRI against fixture
        run: |
          cd /tmp/kiri-fixture
          export TERM=xterm
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/submodules/KiCad-Diff/bin:$PATH"
          export PYTHONPATH="$GITHUB_WORKSPACE:$PYTHONPATH"
          "$GITHUB_WORKSPACE/bin/kiri" led-panel.kicad_pro -g "${{ steps.commits.outputs.oldest }}..${{ steps.commits.outputs.newest }}" -l -r -k -d .kiri-ci -V

      - name: Validate generated artifacts
        run: |
          cd /tmp/kiri-fixture/.kiri-ci
          test -f web/index.html
          test -f commits.html
          test -d "${{ steps.commits.outputs.oldest }}"
          test -d "${{ steps.commits.outputs.newest }}"
          test -f "${{ steps.commits.outputs.oldest }}/_KIRI_/sch/led-panel.svg"
          test -f "${{ steps.commits.outputs.newest }}/_KIRI_/sch/led-panel.svg"
          grep "${{ steps.commits.outputs.oldest }}" commits.html
          grep "${{ steps.commits.outputs.newest }}" commits.html

      - name: Capture rendered page screenshot
        run: |
          cd /tmp/kiri-fixture/.kiri-ci
          ./kiri-server -S -p 8877 . > /tmp/kiri-server-e2e.log 2>&1 &
          SERVER_PID=$!
          SERVER_READY=0
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8877/web/index.html > /dev/null 2>&1; then
              SERVER_READY=1
              break
            fi
            sleep 1
          done
          if [[ "$SERVER_READY" -ne 1 ]]; then
            echo "kiri-server did not become ready within 30 seconds" >&2
            cat /tmp/kiri-server-e2e.log >&2
            exit 1
          fi
          "$GITHUB_WORKSPACE/node_modules/.bin/playwright" screenshot \
            --device="Desktop Chrome" \
            --wait-for-timeout=4000 \
            http://127.0.0.1:8877/web/index.html \
            web/kiri-e2e-screenshot.png
          kill "$SERVER_PID" || true
          test -f web/kiri-e2e-screenshot.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-screenshot
          path: /tmp/kiri-fixture/.kiri-ci/web/kiri-e2e-screenshot.png
          retention-days: 7
          include-hidden-files: true

      - name: Upload E2E output artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-output
          path: /tmp/kiri-fixture/.kiri-ci
          retention-days: 7
          include-hidden-files: true

      - name: Upload KiRI server log
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-server-log
          path: /tmp/kiri-server-e2e.log
          retention-days: 7
