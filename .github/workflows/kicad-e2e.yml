name: KiCad E2E (manual)

on:
  workflow_dispatch:
    inputs:
      fixture_repo:
        description: "Fixture repository URL"
        required: false
        default: "https://github.com/robot-army/programmable-led-panel.git"
      fixture_ref:
        description: "Fixture git ref"
        required: false
        default: "main"
      fixture_old_commit:
        description: "Older commit hash to compare (default is pinned for reproducible results)"
        required: false
        default: "1222b944"
      fixture_new_commit:
        description: "Newer commit hash to compare (default is pinned for reproducible results)"
        required: false
        default: "d010632b"

jobs:
  kicad-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout KiRI
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1.53.2-chromium-${{ runner.os }}

      - name: Cache KiCad apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: kicad-9.0-apt-${{ runner.os }}-v1
          restore-keys: |
            kicad-9.0-apt-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sexpdata
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            kicad kicad-footprints kicad-symbols kicad-templates dos2unix
          npm install --no-save playwright@1.53.2
          if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]]; then
            npx playwright@1.53.2 install --with-deps chromium
          else
            npx playwright@1.53.2 install-deps chromium
          fi

      - name: Show tool versions
        run: |
          python --version
          node --version
          npm --version
          kicad-cli --version
          dos2unix --version | head -n 1

      - name: Clone fixture project
        run: |
          git clone --branch "${{ github.event.inputs.fixture_ref || 'main' }}" "${{ github.event.inputs.fixture_repo || 'https://github.com/robot-army/programmable-led-panel.git' }}" /tmp/kiri-fixture
          cd /tmp/kiri-fixture
          git rev-parse HEAD

      - name: Resolve comparison commits
        id: commits
        run: |
          cd /tmp/kiri-fixture

          if [[ -n "${{ github.event.inputs.fixture_old_commit }}" ]] && [[ -n "${{ github.event.inputs.fixture_new_commit }}" ]]; then
            OLDEST=$(git rev-parse --short "${{ github.event.inputs.fixture_old_commit }}")
            NEWEST=$(git rev-parse --short "${{ github.event.inputs.fixture_new_commit }}")
          else
            NEWEST=$(git rev-parse --short HEAD)
            OLDEST=$(git rev-parse --short HEAD~1)
          fi

          echo "newest=$NEWEST" >> "$GITHUB_OUTPUT"
          echo "oldest=$OLDEST" >> "$GITHUB_OUTPUT"

      - name: Run KiRI against fixture
        run: |
          cd /tmp/kiri-fixture
          export TERM=xterm
          export PATH="$GITHUB_WORKSPACE/bin:$GITHUB_WORKSPACE/submodules/KiCad-Diff/bin:$PATH"
          export PYTHONPATH="$GITHUB_WORKSPACE:$PYTHONPATH"
          "$GITHUB_WORKSPACE/bin/kiri" led-panel.kicad_pro -g "${{ steps.commits.outputs.oldest }}..${{ steps.commits.outputs.newest }}" -l -r -k -d .kiri-ci -V

      - name: Validate generated artifacts
        run: |
          cd /tmp/kiri-fixture/.kiri-ci
          test -f web/index.html
          test -f commits.html
          test -d "${{ steps.commits.outputs.oldest }}"
          test -d "${{ steps.commits.outputs.newest }}"
          test -f "${{ steps.commits.outputs.oldest }}/_KIRI_/sch/led-panel.svg"
          test -f "${{ steps.commits.outputs.newest }}/_KIRI_/sch/led-panel.svg"
          grep "${{ steps.commits.outputs.oldest }}" commits.html
          grep "${{ steps.commits.outputs.newest }}" commits.html

      - name: Capture schematic diff screenshots
        run: |
          set -euo pipefail
          cd /tmp/kiri-fixture/.kiri-ci
          mkdir -p web/e2e-screenshots

          cleanup() {
            if [[ -n "${SERVER_PID:-}" ]]; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }

          ./kiri-server -S -p 8877 . > /tmp/kiri-server-e2e.log 2>&1 &
          SERVER_PID=$!
          trap cleanup EXIT

          SERVER_READY=0
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8877/web/index.html > /dev/null 2>&1; then
              SERVER_READY=1
              break
            fi
            sleep 1
          done
          if [[ "$SERVER_READY" -ne 1 ]]; then
            echo "kiri-server did not become ready within 30 seconds" >&2
            cat /tmp/kiri-server-e2e.log >&2
            exit 1
          fi

          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install --prefix /tmp/kiri-playwright --no-save playwright@1.53.2
          NODE_PATH=/tmp/kiri-playwright/node_modules node <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1920, height: 1080 } });
            await page.goto('http://127.0.0.1:8877/web/index.html', { waitUntil: 'networkidle' });
            await page.waitForTimeout(3000);

            // Full UI screenshot (schematic view by default)
            await page.screenshot({ path: 'web/e2e-screenshots/00-full-ui.png', fullPage: true });

            // Crop just the schematic diff viewport for baseline page
            await page.locator('#diff-container').screenshot({ path: 'web/e2e-screenshots/01-schematic-diff-page-1.png' });

            // Try to switch to another schematic page and screenshot again
            const pageRadios = page.locator("#pages_list input[type='radio'][name='pages']");
            const count = await pageRadios.count();
            if (count > 1) {
              await pageRadios.nth(1).check();
              await page.waitForTimeout(1200);
              await page.locator('#diff-container').screenshot({ path: 'web/e2e-screenshots/02-schematic-diff-page-2.png' });
            }

            await browser.close();
          })();
          EOF

          test -f web/e2e-screenshots/00-full-ui.png
          test -f web/e2e-screenshots/01-schematic-diff-page-1.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-screenshot
          path: /tmp/kiri-fixture/.kiri-ci/web/e2e-screenshots
          retention-days: 7
          include-hidden-files: true

      - name: Upload E2E output artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-output
          path: /tmp/kiri-fixture/.kiri-ci
          retention-days: 7
          include-hidden-files: true

      - name: Upload KiRI server log
        uses: actions/upload-artifact@v4
        with:
          name: kiri-e2e-server-log
          path: /tmp/kiri-server-e2e.log
          retention-days: 7
