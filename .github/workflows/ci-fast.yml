name: CI (fast)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sexpdata

      - name: Run netdiff integration tests
        run: |
          python -m py_compile bin/kiri-netdiff-snapshot
          python tests/netdiff_integration/test_netdiff_integration.py
          python tests/netdiff_integration/test_netdiff_sheet_rename.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run syntax checks on shell scripts
        run: |
          bash -n bin/kiri
          shellcheck bin/netdiff
